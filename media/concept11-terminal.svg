<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3050"/>
      <stop offset="100%" stop-color="#10131e"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </linearGradient>
    <linearGradient id="lensRing11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd6f4"/>
      <stop offset="100%" stop-color="#6b7a99"/>
    </linearGradient>
    <radialGradient id="lensFill11" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="termShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="caretGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#bg11)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- terminal card -->
  <g filter="url(#termShadow)">
    <rect x="18" y="26" width="86" height="70" rx="8" fill="url(#termBg)" stroke="#3a4258" stroke-width="1.5"/>
    <!-- title bar dots -->
    <circle cx="26" cy="34" r="2.4" fill="#ff6b6b"/>
    <circle cx="34" cy="34" r="2.4" fill="#fbbf24"/>
    <circle cx="42" cy="34" r="2.4" fill="#4ade80"/>
    <line x1="18" y1="40" x2="104" y2="40" stroke="#3a4258" stroke-width="1"/>

    <!-- line 1: completed command -->
    <text x="27" y="56" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#7aa2ff">$</text>
    <line x1="35" y1="53" x2="68" y2="53" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(76 53)">
      <circle r="4" fill="#4ade80"/>
      <path d="M -2 0 L -0.5 1.5 L 2 -1.5" stroke="#0f1a12" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- line 2: running command with caret -->
    <text x="27" y="70" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#7aa2ff">$</text>
    <line x1="35" y1="67" x2="62" y2="67" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>
    <rect x="65" y="62" width="3" height="9" fill="#9bb8ff" filter="url(#caretGlow)">
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- line 3: pending -->
    <text x="27" y="84" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="#7aa2ff" opacity="0.55">$</text>
    <line x1="35" y1="81" x2="58" y2="81" stroke="#8a93a8" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- lens overlapping bottom-right corner of terminal -->
  <g>
    <circle cx="98" cy="88" r="19" fill="url(#lensFill11)" stroke="url(#lensRing11)" stroke-width="5"/>
    <path d="M 87 82 A 19 19 0 0 1 95 74" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <line x1="111" y1="101" x2="124" y2="114" stroke="url(#lensRing11)" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
