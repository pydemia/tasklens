<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3050"/>
      <stop offset="100%" stop-color="#10131e"/>
    </linearGradient>
    <linearGradient id="termBg15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </linearGradient>
    <linearGradient id="lensRing15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd6f4"/>
      <stop offset="100%" stop-color="#6b7a99"/>
    </linearGradient>
    <radialGradient id="lensFill15" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="termShadow15" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow15" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#bg15)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- terminal card -->
  <g filter="url(#termShadow15)">
    <rect x="14" y="22" width="100" height="74" rx="8" fill="url(#termBg15)" stroke="#3a4258" stroke-width="1.5"/>
    <circle cx="22" cy="30" r="2.4" fill="#ff6b6b"/>
    <circle cx="30" cy="30" r="2.4" fill="#fbbf24"/>
    <circle cx="38" cy="30" r="2.4" fill="#4ade80"/>
    <line x1="14" y1="36" x2="114" y2="36" stroke="#3a4258" stroke-width="1"/>

    <!-- root: npm (done) -->
    <g transform="translate(28 53)">
      <path d="M -1 -3 L 3 0 L -1 3 Z" fill="#cdd6f4" opacity="0.7"/>
    </g>
    <line x1="36" y1="53" x2="74" y2="53" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(82 53)">
      <circle r="4" fill="#4ade80"/>
      <path d="M -2 0 L -0.5 1.5 L 2 -1.5" stroke="#0f1a12" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- guide lines for hierarchy -->
    <path d="M 30 56 L 30 68 L 38 68" stroke="#3a4258" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 30 68 L 30 80 L 38 80" stroke="#3a4258" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- child 1: watch (running) -->
    <line x1="42" y1="68" x2="74" y2="68" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>
    <g transform="translate(82 68)" filter="url(#glow15)">
      <circle r="5" fill="none" stroke="#2a3148" stroke-width="2.5"/>
      <g>
        <path d="M 0 -5 A 5 5 0 0 1 5 0" stroke="#7aa2ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.4s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- child 2: tsc (pending) -->
    <line x1="42" y1="80" x2="68" y2="80" stroke="#8a93a8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <circle cx="82" cy="80" r="4" fill="none" stroke="#8a93a8" stroke-width="1.8" opacity="0.7"/>
  </g>

  <!-- lens overlapping bottom-right corner of terminal -->
  <g>
    <circle cx="106" cy="92" r="17" fill="url(#lensFill15)" stroke="url(#lensRing15)" stroke-width="5"/>
    <path d="M 96 87 A 17 17 0 0 1 103 79" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <line x1="118" y1="104" x2="124" y2="110" stroke="url(#lensRing15)" stroke-width="6.5" stroke-linecap="round"/>
  </g>
</svg>
