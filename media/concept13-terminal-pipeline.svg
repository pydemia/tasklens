<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3050"/>
      <stop offset="100%" stop-color="#10131e"/>
    </linearGradient>
    <linearGradient id="termBg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0a0d16"/>
    </linearGradient>
    <linearGradient id="lensRing13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cdd6f4"/>
      <stop offset="100%" stop-color="#6b7a99"/>
    </linearGradient>
    <radialGradient id="lensFill13" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow13" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="50%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#cdd6f4" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="termShadow13" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow13" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#bg13)"/>
  <rect x="0.5" y="0.5" width="127" height="127" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- terminal card -->
  <g filter="url(#termShadow13)">
    <rect x="14" y="22" width="100" height="74" rx="8" fill="url(#termBg13)" stroke="#3a4258" stroke-width="1.5"/>
    <circle cx="22" cy="30" r="2.4" fill="#ff6b6b"/>
    <circle cx="30" cy="30" r="2.4" fill="#fbbf24"/>
    <circle cx="38" cy="30" r="2.4" fill="#4ade80"/>
    <line x1="14" y1="36" x2="114" y2="36" stroke="#3a4258" stroke-width="1"/>

    <!-- prompt -->
    <text x="26" y="58" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="#7aa2ff">$</text>
    <line x1="36" y1="55" x2="62" y2="55" stroke="#cdd6f4" stroke-width="3" stroke-linecap="round"/>

    <!-- pipeline flow row -->
    <line x1="28" y1="74" x2="100" y2="74" stroke="url(#flow13)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- stage 1: done -->
    <g transform="translate(30 74)">
      <circle r="6.5" fill="#4ade80"/>
      <path d="M -3 0 L -1 2 L 3 -2" stroke="#0f1a12" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <!-- stage 2: running -->
    <g transform="translate(64 74)" filter="url(#glow13)">
      <circle r="8" fill="none" stroke="#2a3148" stroke-width="3"/>
      <g>
        <path d="M 0 -8 A 8 8 0 0 1 8 0" stroke="#7aa2ff" stroke-width="3" stroke-linecap="round" fill="none"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.4s" repeatCount="indefinite"/>
      </g>
      <circle r="2.2" fill="#7aa2ff"/>
    </g>
    <!-- stage 3: pending -->
    <g transform="translate(98 74)" opacity="0.7">
      <circle r="6" fill="none" stroke="#8a93a8" stroke-width="2"/>
    </g>

    <!-- arrow nudges -->
    <path d="M 42 71 L 46 74 L 42 77" stroke="#cdd6f4" stroke-opacity="0.5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 78 71 L 82 74 L 78 77" stroke="#cdd6f4" stroke-opacity="0.5" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- lens overlapping bottom-right corner of terminal -->
  <g>
    <circle cx="106" cy="92" r="17" fill="url(#lensFill13)" stroke="url(#lensRing13)" stroke-width="5"/>
    <path d="M 96 87 A 17 17 0 0 1 103 79" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <line x1="118" y1="104" x2="124" y2="110" stroke="url(#lensRing13)" stroke-width="6.5" stroke-linecap="round"/>
  </g>
</svg>
